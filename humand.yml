name: Humand - Llamado de Atención

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:          # También permite correrlo manualmente desde GitHub

jobs:
  procesar-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar LibreOffice
        run: sudo apt-get install -y libreoffice

      - name: Instalar dependencias Python
        run: pip install requests

      - name: Restaurar processed_tasks.json
        uses: actions/cache@v4
        with:
          path: processed_tasks.json
          key: processed-tasks-${{ github.run_id }}
          restore-keys: |
            processed-tasks-

      - name: Ejecutar script
        env:
          HUMAND_API_KEY: ${{ secrets.HUMAND_API_KEY }}
          HUMAND_SERVICE_ITEM_ID: ${{ secrets.HUMAND_SERVICE_ITEM_ID }}
          HUMAND_FOLDER_ID: ${{ secrets.HUMAND_FOLDER_ID }}
          HUMAND_CREATED_FROM: ${{ secrets.HUMAND_CREATED_FROM }}
        run: python main.py

      - name: Guardar processed_tasks.json actualizado
        uses: actions/cache/save@v4
        if: always()
        with:
          path: processed_tasks.json
          key: processed-tasks-${{ github.run_id }}
